<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BloomWay — Explore Your Dream Destination</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
</head>
<body>

  <!-- ============ NAVBAR ============ -->
  <header class="navbar">
    <div class="navbar__logo">
      <i class="fa-solid fa-spa"></i>
      <span>BloomWay</span>
    </div>

    <nav class="navbar__links">
      <a href="index.html" class="active">Home</a>
      <a href="about.html">About Us</a>
      <a href="contact.html">Contact Us</a>
    </nav>

    <div class="navbar__search">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input
          type="text"
          id="searchInput"
          placeholder="Enter a destination or keyword"
        />
      </div>
      <button id="searchBtn" class="btn btn--primary">Search</button>
      <button id="clearBtn" class="btn btn--ghost">Clear</button>
    </div>
  </header>

  <!-- ============ HERO ============ -->
  <section class="hero">
    <div class="hero__social">
      <a href="#"><i class="fa-brands fa-twitter"></i></a>
      <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
      <a href="#"><i class="fa-brands fa-instagram"></i></a>
      <a href="#"><i class="fa-brands fa-youtube"></i></a>
    </div>

    <div class="hero__content">
      <h1 class="hero__title">
        EXPLORE<br />
        DREAM<br />
        DESTINATION
      </h1>
      <p class="hero__text">
        It invites us to explore unfamiliar lands and embrace diverse cultures,
        all while journeying toward a destination that sparks wonder.
      </p>
      <button class="btn btn--book">BOOK NOW</button>
    </div>
  </section>

  <!-- ============ RESULTS ============ -->
  <section id="results" class="results" aria-live="polite"></section>

  <!-- ============ FOOTER ============ -->
  <footer class="footer">
    <p>&copy; 2026 BloomWay. All rights reserved.</p>
  </footer>

  <script src="travel_recommendation.js"></script>
</body>
</html>
